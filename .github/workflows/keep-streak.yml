name: GitHub Streak Keeper Bot

on:
  schedule:
    - cron: "5 18 * * *"  # Adjust for your timezone, e.g., ~00:05 IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update file
        run: echo "$(date -u +%F) — heartbeat" >> keepalive.txt
      - name: Commit changes
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add keepalive.txt
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Daily update $(date -u +%F)"
            git push
          fi
